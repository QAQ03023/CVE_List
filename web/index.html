<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金匠獎 - 資安風險客服系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-800 border-b border-blue-500 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">金匠獎 CVE 客服系統</h1>
            <input type="text" id="searchInput" placeholder="搜尋 CVE ID..." 
                   class="w-1/3 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
        </div>
    </nav>

    <main class="container mx-auto p-6 flex flex-wrap gap-6">
        <div class="w-full lg:w-1/4 bg-gray-800 p-4 rounded-xl shadow-lg">
            <h2 class="text-lg font-semibold mb-4 text-center">風險等級分佈</h2>
            <canvas id="riskChart"></canvas>
        </div>

        <div class="flex-1 bg-gray-800 p-4 rounded-xl shadow-lg min-h-[500px]">
            <h2 class="text-lg font-semibold mb-4">資安漏洞清單</h2>
            <div id="resultsList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        // 1. 初始化：抓取統計資料並畫圖
        async function initDashboard() {
            const response = await fetch('/api/stats');
            const stats = await response.json();

            const ctx = document.getElementById('riskChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low', 'None', 'Unknown'],
                    datasets: [{
                        data: [
                            stats.critical, 
                            stats.high, 
                            stats.medium, 
                            stats.low, 
                            stats.none_risk, 
                            stats.unknown
                        ],
                        backgroundColor: [
                            '#ef4444', // Critical: 紅
                            '#f97316', // High: 橘
                            '#eab308', // Medium: 黃
                            '#3b82f6', // Low: 藍
                            '#9ca3af', // None: 灰
                            '#4b5563'  // Unknown: 深灰
                        ],
                        borderWidth: 0
                    }]
                },
                options: { 
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#9ca3af', padding: 20 } 
                        } 
                    } 
                }
            });
        }

        // 2. 搜尋功能
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 3) return;

            const resp = await fetch(`/api/search?q=${query}`);
            const data = await resp.json();
            
            const list = document.getElementById('resultsList');
            list.innerHTML = data.map(item => `
                <div class="p-4 border border-gray-700 rounded-lg hover:border-blue-400 cursor-pointer">
                    <span class="text-blue-400 font-bold">${item.cve_id}</span>
                    <p class="text-sm text-gray-400 mt-1">${item.description || '無描述'}</p>
                </div>
            `).join('');
        });

        // 執行初始化
        initDashboard();
    </script>
</body>
</html>
